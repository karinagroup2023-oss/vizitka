    <style>
      :root {
        --gold: #c9a84c;
        --gold-light: #e8c97a;
        --dark: #08090d;
        --text: #ede3cc;
        --font: 'Cormorant Garamond', Georgia, serif;
      }
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { height: 100%; }
      body { background: var(--dark); font-family: var(--font); color: var(--text); overflow: hidden; }
      #cvs { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
      .page { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 1; overflow-y: auto; padding: 24px; }
      .card { background: linear-gradient(160deg, #141620 0%, #0d0f18 60%, #09090f 100%); border: 1px solid rgba(201,168,76,.18); border-radius: 18px; padding: 36px 32px 28px; width: min(420px, 100%); text-align: center; box-shadow: 0 0 80px rgba(201,168,76,.04), 0 40px 100px rgba(0,0,0,.7), inset 0 1px 0 rgba(255,255,255,.03); transition: transform 0.1s ease-out; will-change: transform; }
      .ornament { display: flex; align-items: center; gap: 8px; margin-bottom: 24px; }
      .orn-line { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, rgba(201,168,76,.45), transparent); }
      .orn-diamond { width: 7px; height: 7px; background: var(--gold); transform: rotate(45deg); flex-shrink: 0; }
      .photo-container { position: relative; width: 112px; height: 112px; margin: 0 auto 22px; }
      .photo-ring { position: absolute; inset: -6px; border-radius: 50%; border: 1px solid rgba(201,168,76,.45); box-shadow: 0 0 20px rgba(201,168,76,.1); }
      .photo { width: 112px; height: 112px; border-radius: 50%; object-fit: cover; display: block; border: 2px solid rgba(201,168,76,.25); }
      .pre-name { font-size: 9.5px; letter-spacing: 3.5px; text-transform: uppercase; color: var(--gold); opacity: .65; margin-bottom: 10px; }
      .name { font-size: 28px; font-weight: 400; letter-spacing: .5px; color: #f2e9d4; margin-bottom: 14px; }
      .slim { height: 1px; width: 36px; background: var(--gold); opacity: .5; margin: 0 auto 14px; }
      .role { font-size: 13px; color: var(--gold-light); letter-spacing: 1px; opacity: .85; margin-bottom: 5px; }
      .company { font-size: 10.5px; letter-spacing: 2px; text-transform: uppercase; color: rgba(201,168,76,.5); }
      .ornament-wide { display: flex; align-items: center; gap: 14px; margin: 26px 0 22px; }
      .orn-text { font-size: 9px; letter-spacing: 3.5px; text-transform: uppercase; color: rgba(201,168,76,.55); white-space: nowrap; flex-shrink: 0; }
      .socials { display: flex; justify-content: center; gap: 14px; flex-wrap: wrap; margin-bottom: 28px; }
      .soc { display: flex; flex-direction: column; align-items: center; gap: 7px; text-decoration: none; color: var(--text); cursor: pointer; }
      .soc-icon { width: 44px; height: 44px; border-radius: 50%; border: 1px solid rgba(201,168,76,.22); background: rgba(201,168,76,.04); display: flex; align-items: center; justify-content: center; color: var(--gold); transition: background .2s, border-color .2s, box-shadow .2s; }
      .soc-icon svg { width: 18px; height: 18px; }
      .soc:hover .soc-icon { background: rgba(201,168,76,.12); border-color: rgba(201,168,76,.5); box-shadow: 0 0 16px rgba(201,168,76,.18); }
      .soc-label { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(201,168,76,.45); }
      .cta-wrap { margin-bottom: 28px; }
      .cta { display: inline-flex; align-items: center; gap: 10px; padding: 13px 30px; border: 1px solid rgba(201,168,76,.35); border-radius: 4px; text-decoration: none; color: var(--gold-light); font-family: var(--font); font-size: 11px; letter-spacing: 2.5px; text-transform: uppercase; background: rgba(201,168,76,.04); transition: background .2s, border-color .2s, box-shadow .2s; }
      .cta svg { width: 15px; height: 15px; flex-shrink: 0; }
      .cta:hover { background: rgba(201,168,76,.1); border-color: rgba(201,168,76,.6); box-shadow: 0 0 24px rgba(201,168,76,.14); }
      .bottom { text-align: center; }
      .ornament-bottom { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
      .footer-text { font-size: 9px; letter-spacing: 2.5px; text-transform: uppercase; color: rgba(201,168,76,.28); }

    <script>
      // Particles
      const cvs = document.getElementById('cvs');
      const ctx = cvs.getContext('2d');
      let particles = [];

      const resize = () => { cvs.width = window.innerWidth; cvs.height = window.innerHeight; };
      resize();
      window.addEventListener('resize', resize);

      particles = Array.from({ length: 90 }, () => ({
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        r: Math.random() * 1.8 + 0.4,
        vx: (Math.random() - 0.5) * 0.25,
        vy: (Math.random() - 0.5) * 0.15 - 0.05,
        a: Math.random(),
        va: Math.random() * 0.005 + 0.002,
        dir: Math.random() < 0.5 ? 1 : -1,
      }));

      const draw = () => {
        ctx.clearRect(0, 0, cvs.width, cvs.height);
        particles.forEach(p => {
          p.x += p.vx; p.y += p.vy;
          p.a += p.va * p.dir;
          if (p.a > 0.7 || p.a < 0) p.dir *= -1;
          if (p.x < 0) p.x = cvs.width;
          if (p.x > cvs.width) p.x = 0;
          if (p.y < 0) p.y = cvs.height;
          if (p.y > cvs.height) p.y = 0;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(201,168,76,${p.a * 0.8})`;
          ctx.fill();
        });
        requestAnimationFrame(draw);
      };
      draw();

      // 3D tilt on mouse move
      const card = document.getElementById('card');
      document.addEventListener('mousemove', e => {
        const dx = (e.clientX - window.innerWidth / 2) / window.innerWidth;
        const dy = (e.clientY - window.innerHeight / 2) / window.innerHeight;
        card.style.transform = `perspective(1200px) rotateY(${dx * 5}deg) rotateX(${-dy * 4}deg)`;
      });
      document.addEventListener('mouseleave', () => {
        card.style.transform = '';
      });
    </script>
